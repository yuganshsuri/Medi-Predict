<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>History — MediPredict</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0B1C17; --bg2: #111F1A; --card: #162820;
      --mint: #00C896; --sage: #3DB87A;
      --text: #E8F5EF; --muted: #7BA898; --border: rgba(0,200,150,0.15);
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 4rem;
      background: rgba(11,28,23,0.7); backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
    }
    .logo { font-family: 'Space Grotesk', sans-serif; font-size: 1.35rem; font-weight: 700; color: var(--mint); }
    .logo span { color: var(--text); }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a { text-decoration: none; color: var(--muted); font-size: 0.875rem; font-weight: 500; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--mint); }
    .nav-cta { background: var(--mint); color: #071410; padding: 0.55rem 1.4rem; border-radius: 100px; font-size: 0.875rem; font-weight: 600; text-decoration: none; }

    .page { max-width: 1100px; margin: 0 auto; padding: 3rem 2rem 5rem; }
    .page-header { margin-bottom: 2.5rem; display: flex; align-items: flex-end; justify-content: space-between; }
    .eyebrow { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--mint); margin-bottom: 0.5rem; }
    h1 { font-family: 'Space Grotesk', sans-serif; font-size: 2.2rem; font-weight: 700; letter-spacing: -0.03em; }
    .sub { color: var(--muted); margin-top: 0.4rem; }

    /* Summary cards */
    .summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2.5rem; }
    .sum-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem;
    }
    .sum-card .s-val { font-family: 'Space Grotesk', sans-serif; font-size: 2rem; font-weight: 700; color: var(--mint); }
    .sum-card .s-lbl { font-size: 0.78rem; color: var(--muted); margin-top: 0.25rem; }

    /* Filters */
    .filters {
      display: flex; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center;
    }
    .filter-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: 0.4rem 1rem; border-radius: 100px; font-size: 0.82rem;
      cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s;
    }
    .filter-btn:hover { border-color: var(--mint); color: var(--text); }
    .filter-btn.active { background: rgba(0,200,150,0.12); border-color: var(--mint); color: var(--mint); }
    .search-box {
      margin-left: auto; background: var(--card); border: 1px solid var(--border);
      border-radius: 100px; padding: 0.4rem 1rem; color: var(--text);
      font-family: 'Inter', sans-serif; font-size: 0.82rem; outline: none;
      width: 200px; transition: border-color 0.2s;
    }
    .search-box:focus { border-color: var(--mint); }
    .search-box::placeholder { color: var(--muted); }

    /* Table */
    .history-table { width: 100%; border-collapse: collapse; }
    .history-table thead th {
      text-align: left; font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted);
      padding: 0.75rem 1rem; border-bottom: 1px solid var(--border);
    }
    .history-table tbody tr {
      border-bottom: 1px solid rgba(0,200,150,0.07);
      transition: background 0.2s;
    }
    .history-table tbody tr:hover { background: rgba(0,200,150,0.04); }
    .history-table td { padding: 1rem; font-size: 0.875rem; vertical-align: middle; }

    .cell-disease { display: flex; align-items: center; gap: 0.65rem; }
    .cell-icon { font-size: 1.3rem; }
    .cell-name { font-weight: 500; color: var(--text); }
    .cell-date { color: var(--muted); font-size: 0.8rem; }

    .risk-badge {
      display: inline-flex; padding: 0.25rem 0.7rem; border-radius: 100px;
      font-size: 0.75rem; font-weight: 600;
    }
    .risk-low { background: rgba(0,200,150,0.12); color: #00C896; }
    .risk-med { background: rgba(255,183,77,0.12); color: #FFB74D; }
    .risk-high { background: rgba(255,107,107,0.12); color: #FF6B6B; }

    .risk-mini-bar { width: 80px; height: 5px; background: rgba(255,255,255,0.06); border-radius: 100px; overflow: hidden; margin-top: 3px; }
    .risk-mini-fill { height: 100%; border-radius: 100px; }

    .action-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: 0.3rem 0.7rem; border-radius: 8px; font-size: 0.75rem;
      cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s;
    }
    .action-btn:hover { border-color: var(--mint); color: var(--mint); }

    /* Chart section */
    .chart-section { margin-bottom: 2.5rem; }
    .chart-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 1.75rem;
    }
    .chart-title { font-family: 'Space Grotesk', sans-serif; font-size: 1rem; font-weight: 600; margin-bottom: 1.25rem; }
    .bar-chart { display: flex; gap: 1rem; align-items: flex-end; height: 140px; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 0.4rem; }
    .bar-wrap { flex: 1; width: 100%; display: flex; align-items: flex-end; }
    .bar {
      width: 100%; border-radius: 6px 6px 0 0;
      background: linear-gradient(to top, #00C896, #3DB87A);
      opacity: 0.75; transition: opacity 0.2s;
    }
    .bar:hover { opacity: 1; }
    .bar-label { font-size: 0.68rem; color: var(--muted); text-align: center; }
    .bar-val { font-size: 0.75rem; color: var(--mint); font-weight: 600; }

    .empty-state {
      text-align: center; padding: 5rem 2rem;
      background: var(--card); border: 1px solid var(--border); border-radius: 20px;
    }
    .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
    .empty-state h3 { font-family: 'Space Grotesk', sans-serif; font-size: 1.2rem; font-weight: 600; margin-bottom: 0.5rem; }
    .empty-state p { color: var(--muted); font-size: 0.875rem; margin-bottom: 1.5rem; }
    .btn-start { background: linear-gradient(135deg, #00C896, #3DB87A); color: #071410; padding: 0.75rem 2rem; border-radius: 100px; font-weight: 700; text-decoration: none; font-size: 0.9rem; }

    .clear-btn {
      background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.25);
      color: #FF6B6B; padding: 0.4rem 1rem; border-radius: 100px; font-size: 0.82rem;
      cursor: pointer; font-family: 'Inter', sans-serif;
    }

    .section-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; font-weight: 600; margin-bottom: 1.25rem; }
  </style>
</head>
<body>
<nav>
  <div class="logo">Medi<span>Predict</span></div>
  <ul class="nav-links">
    <li><a href="/">Home</a></li>
    <li><a href="/project">Predict</a></li>
    <li><a href="/history" class="active">History</a></li>
    <li><a href="/about">About</a></li>
    <li><a href="/contact">Contact</a></li>
  </ul>
  <a href="/project" class="nav-cta">New Prediction</a>
</nav>

<div class="page">
  <div class="page-header">
    <div>
      <div class="eyebrow">Diagnostic Log</div>
      <h1>Prediction History</h1>
      <p class="sub">All your past diagnostic runs stored locally in your browser.</p>
    </div>
    <button class="clear-btn" onclick="clearHistory()">🗑 Clear All</button>
  </div>

  <!-- Summary -->
  <div class="summary" id="summaryCards">
    <div class="sum-card"><div class="s-val" id="sTotalRuns">0</div><div class="s-lbl">Total Predictions</div></div>
    <div class="sum-card"><div class="s-val" id="sHighRisk">0</div><div class="s-lbl">High Risk Flags</div></div>
    <div class="sum-card"><div class="s-val" id="sAvgRisk">—</div><div class="s-lbl">Avg Risk Score</div></div>
    <div class="sum-card"><div class="s-val" id="sDisease">—</div><div class="s-lbl">Most Checked</div></div>
  </div>

  <!-- Chart -->
  <div class="chart-section" id="chartSection" style="display:none">
    <div class="chart-card">
      <div class="chart-title">Risk Over Time</div>
      <div class="bar-chart" id="barChart"></div>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" onclick="filterHistory('all', this)">All</button>
    <button class="filter-btn" onclick="filterHistory('low', this)">Low Risk</button>
    <button class="filter-btn" onclick="filterHistory('medium', this)">Medium</button>
    <button class="filter-btn" onclick="filterHistory('high', this)">High Risk</button>
    <input class="search-box" type="text" placeholder="Search disease…" oninput="searchHistory(this.value)" />
  </div>

  <div class="section-title" id="tableTitle">Recent Predictions</div>

  <!-- Table / Empty -->
  <div id="historyContainer"></div>
</div>

<script>
let allHistory = [];
let currentFilter = 'all';
let searchTerm = '';

function loadHistory() {
  allHistory = JSON.parse(localStorage.getItem('mp_history') || '[]');
  renderSummary();
  renderChart();
  renderTable();
}

function renderSummary() {
  const h = allHistory;
  document.getElementById('sTotalRuns').textContent = h.length;
  const highs = h.filter(r => r.risk > 60).length;
  document.getElementById('sHighRisk').textContent = highs;
  const avg = h.length ? Math.round(h.reduce((s,r)=>s+r.risk,0)/h.length) : null;
  document.getElementById('sAvgRisk').textContent = avg != null ? avg + '%' : '—';
  const freq = {};
  h.forEach(r => { freq[r.disease] = (freq[r.disease]||0)+1; });
  const top = Object.entries(freq).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('sDisease').textContent = top ? top[0].split(' ')[0] : '—';
}

function renderChart() {
  const sec = document.getElementById('chartSection');
  if (allHistory.length < 2) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  const last10 = allHistory.slice(0, 10).reverse();
  const maxRisk = Math.max(...last10.map(r=>r.risk), 1);
  const chart = document.getElementById('barChart');
  chart.innerHTML = last10.map((r, i) => {
    const h = Math.round((r.risk / maxRisk) * 120);
    const color = r.risk > 60 ? '#FF6B6B' : r.risk > 35 ? '#FFB74D' : '#00C896';
    return `<div class="bar-col">
      <div class="bar-val" style="color:${color}">${r.risk}%</div>
      <div class="bar-wrap"><div class="bar" style="height:${h}px;background:linear-gradient(to top,${color}88,${color})"></div></div>
      <div class="bar-label">${r.disease.split(' ')[0]}</div>
    </div>`;
  }).join('');
}

function riskClass(r) { return r > 60 ? 'high' : r > 35 ? 'med' : 'low'; }
function riskLabel(r) { return r > 60 ? 'High Risk' : r > 35 ? 'Moderate' : 'Low Risk'; }
function riskColor(r) { return r > 60 ? '#FF6B6B' : r > 35 ? '#FFB74D' : '#00C896'; }

function filterHistory(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function searchHistory(val) { searchTerm = val.toLowerCase(); renderTable(); }

function renderTable() {
  let data = [...allHistory];
  if (currentFilter !== 'all') {
    data = data.filter(r => {
      if (currentFilter === 'low') return r.risk <= 35;
      if (currentFilter === 'medium') return r.risk > 35 && r.risk <= 60;
      if (currentFilter === 'high') return r.risk > 60;
    });
  }
  if (searchTerm) data = data.filter(r => r.disease.toLowerCase().includes(searchTerm));

  const container = document.getElementById('historyContainer');
  if (data.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📋</div>
      <h3>${allHistory.length === 0 ? 'No Predictions Yet' : 'No Results Match'}</h3>
      <p>${allHistory.length === 0 ? 'Run your first prediction to see it logged here automatically.' : 'Try a different filter or search term.'}</p>
      ${allHistory.length === 0 ? '<a href="project.html" class="btn-start">Make First Prediction →</a>' : ''}
    </div>`;
    return;
  }

  container.innerHTML = `<table class="history-table">
    <thead><tr>
      <th>Disease</th><th>Risk Score</th><th>Risk Level</th><th>Date & Time</th><th>Action</th>
    </tr></thead>
    <tbody>
      ${data.map((r, i) => `<tr>
        <td><div class="cell-disease"><div class="cell-icon">${r.icon}</div><div class="cell-name">${r.disease}</div></div></td>
        <td>
          <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;color:${riskColor(r.risk)}">${r.risk}%</div>
          <div class="risk-mini-bar"><div class="risk-mini-fill" style="width:${r.risk}%;background:${riskColor(r.risk)}"></div></div>
        </td>
        <td><span class="risk-badge risk-${riskClass(r.risk)}">${riskLabel(r.risk)}</span></td>
        <td><div class="cell-date">${r.date}</div></td>
        <td><button class="action-btn" onclick="deleteRecord(${i})">Remove</button></td>
      </tr>`).join('')}
    </tbody>
  </table>`;
}

function deleteRecord(index) {
  allHistory.splice(index, 1);
  localStorage.setItem('mp_history', JSON.stringify(allHistory));
  renderSummary(); renderChart(); renderTable();
}

function clearHistory() {
  if (confirm('Clear all prediction history?')) {
    localStorage.removeItem('mp_history');
    allHistory = [];
    renderSummary(); renderChart(); renderTable();
  }
}

loadHistory();
</script>
</body>
</html>
